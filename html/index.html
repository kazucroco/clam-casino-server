<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clam Casino</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; }
        .controls { margin: 20px; padding: 15px; background: #34495e; border-radius: 8px; display: flex; gap: 10px; align-items: center; }

        #game-container { display: none; margin-top: 20px; }
        .stats-bar { display: flex; justify-content: space-between; width: 100%; max-width: 600px; margin-bottom: 10px; font-weight: bold; }

        .board-wrapper { display: grid; gap: 5px; background: #1a252f; padding: 10px; border-radius: 4px; }
        .card { width: 60px; height: 60px; background: #3498db; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 4px; user-select: none; }
        .card.flipped { background: #ecf0f1; color: #2c3e50; cursor: default; }
        .card.bomb { background: #e74c3c; color: white; }

        .total-cell { width: 60px; height: 60px; background: #f1c40f; color: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; border-radius: 4px; font-weight: bold; }
        .total-cell span { font-size: 18px; }

        input, select, button { padding: 8px; border-radius: 4px; border: none; }
        button { background: #27ae60; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <h1>Clam Casino</h1>

    <div class="controls">
        <input type="text" id="server-ip" placeholder="Server (e.g. kitsu.croco.dev)" value="kitsu.croco.dev">
        <label>Level:</label>
        <select id="level-select">
            <option value="0">1</option>
            <option value="1">2</option>
            <option value="2">3</option>
            <option value="3">4</option>
            <option value="4">5</option>
        </select>
        <button onclick="newGame()">New Game</button>
    </div>

    <div id="game-container">
        <div class="stats-bar">
            <span>Level: <span id="display-level">1</span></span>
            <span>Game Score: <span id="display-score">0</span></span>
            <span>Total PScore: <span id="display-pscore">0</span></span>
        </div>
        <div id="board" class="board-wrapper"></div>
    </div>

    <script>
        let currentGameId = null;
        let gameActive = false;

        async function newGame() {
            const host = document.getElementById('server-ip').value;
            const level = parseInt(document.getElementById('level-select').value);
            const url = `https://${host}/new`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: level })
                });

                const data = await response.json();
                setupBoard(data);
            } catch (err) {
                alert("Error connecting to server. Check IP and CORS settings.");
                console.error(err);
            }
        }

        function setupBoard(data) {
            currentGameId = data.game_id;
            gameActive = true;
            const board = document.getElementById('board');
            const container = document.getElementById('game-container');

            // UI Updates
            document.getElementById('display-level').innerText = data.level + 1;
            document.getElementById('display-pscore').innerText = data.pscore;
            document.getElementById('display-score').innerText = 0;
            container.style.display = 'block';

            // Grid setup: (size) cards + 1 info column/row
            const totalSize = data.size + 1;
            board.style.gridTemplateColumns = `repeat(${totalSize}, 60px)`;
            board.innerHTML = '';

            // Build rows
            for (let r = 0; r < data.size; r++) {
                for (let c = 0; c < data.size; c++) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.id = `cell-${r}-${c}`;
                    card.onclick = () => flipCard(r, c);
                    board.appendChild(card);
                }
                // Row Total (End of row)
                const rowTotal = data.totals.rows[r];
                board.appendChild(createTotalCell(rowTotal));
            }

            // Bottom row (Column Totals)
            for (let c = 0; c < data.size; c++) {
                const colTotal = data.totals.cols[c];
                board.appendChild(createTotalCell(colTotal));
            }

            // Bottom-right empty corner
            const corner = document.createElement('div');
            board.appendChild(corner);
        }

        function createTotalCell(totalArr) {
            const div = document.createElement('div');
            div.className = 'total-cell';
            // totalArr format: [sum, zeroes]
            div.innerHTML = `<span>${totalArr[0]}</span> ⓿ ${totalArr[1]}`;
            return div;
        }

        async function flipCard(row, col) {
            if (!gameActive) return;

            const host = document.getElementById('server-ip').value;
            const url = `https://${host}/flip/${currentGameId}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ row, col })
                });

                const data = await response.json();
                updateCard(row, col, data.card);

                document.getElementById('display-score').innerText = data.score;
                document.getElementById('display-pscore').innerText = data.pscore;

                if (data.over) {
                    gameActive = false;
                    revealSolution(data.solution);
                    setTimeout(() => alert(data.card === 0 ? "Bust! Game Over." : "Level Complete!"), 500);
                }
            } catch (err) {
                console.error("Flip failed", err);
            }
        }

        function updateCard(row, col, value) {
            const cell = document.getElementById(`cell-${row}-${col}`);
            cell.innerText = value;
            cell.classList.add('flipped');
            if (value === 0) cell.classList.add('bomb');
        }

        function revealSolution(solution) {
            if (!solution || solution.length === 0) return;
            for (let r = 0; r < solution.length; r++) {
                for (let c = 0; c < solution[r].length; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    if (!cell.classList.contains('flipped')) {
                        cell.innerText = solution[r][c];
                        cell.style.opacity = "0.6";
                        if (solution[r][c] === 0) cell.classList.add('bomb');
                    }
                }
            }
        }
    </script>
</body>
</html>
