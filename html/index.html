<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Clam Casino</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <audio id="bgm" src="MainTheme.mp3" loop autoplay preload="auto"></audio>

    <div class="balatro-bg">
      <div class="blob orange"></div>
      <div class="blob blue"></div>
      <div class="blob purple"></div>
    </div>

    <h1 id="game-title">Clam Casino</h1>

    <div id="score-board">Score: <span id="current-score">0</span></div>
    <button id="btn-restart-game">RESTART</button>

    <div id="game-board">
      <div class="card" data-row="0" data-col="0">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="0" data-col="1">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="0" data-col="2">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="0" data-col="3">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="0" data-col="4">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>

      <div class="hint row-hint">
        <div class="hint-score"><span id="hint-row-0-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-row-0-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>

      <div class="card" data-row="1" data-col="0">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="1" data-col="1">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="1" data-col="2">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="1" data-col="3">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="1" data-col="4">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>

      <div class="hint row-hint">
        <div class="hint-score"><span id="hint-row-1-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-row-1-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>

      <div class="card" data-row="2" data-col="0">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="2" data-col="1">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="2" data-col="2">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="2" data-col="3">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="2" data-col="4">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>

      <div class="hint row-hint">
        <div class="hint-score"><span id="hint-row-2-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-row-2-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>

      <div class="card" data-row="3" data-col="0">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="3" data-col="1">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="3" data-col="2">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="3" data-col="3">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="3" data-col="4">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>

      <div class="hint row-hint">
        <div class="hint-score"><span id="hint-row-3-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-row-3-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>

      <div class="card" data-row="4" data-col="0">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="4" data-col="1">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="4" data-col="2">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="4" data-col="3">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="card" data-row="4" data-col="4">
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>

      <div class="hint row-hint">
        <div class="hint-score"><span id="hint-row-4-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-row-4-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>

      <div class="hint col-hint">
        <div class="hint-score"><span id="hint-col-0-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-col-0-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>
      <div class="hint col-hint">
        <div class="hint-score"><span id="hint-col-1-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-col-1-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>
      <div class="hint col-hint">
        <div class="hint-score"><span id="hint-col-2-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-col-2-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>
      <div class="hint col-hint">
        <div class="hint-score"><span id="hint-col-3-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-col-3-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>
      <div class="hint col-hint">
        <div class="hint-score"><span id="hint-col-4-score">0</span></div>
        <div class="hint-bombs">
          <span id="hint-col-4-bombs">0</span> <span class="bomb-icon"></span>
        </div>
      </div>
    </div>

    <div id="game-over-screen" style="display: none">
      <div class="modal-content">
        <h2 id="game-over-title">Game Over</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="btn-restart">Play Again</button>
      </div>
    </div>

    <script>
      const allCards = document.querySelectorAll(".card");
      const restartBtn = document.getElementById("btn-restart");
      const restartGameBtn = document.getElementById("btn-restart-game");
      const gameOverScreen = document.getElementById("game-over-screen");
      const currentScore = document.getElementById("current-score");

      function initBoard() {
        let rowScores = [0, 0, 0, 0, 0];
        let rowBombs = [0, 0, 0, 0, 0];
        let colScores = [0, 0, 0, 0, 0];
        let colBombs = [0, 0, 0, 0, 0];

        allCards.forEach((card) => {
          card.classList.remove(
            "is-flipped",
            "val-0",
            "val-1",
            "val-2",
            "val-3",
          );

          const val = Math.floor(Math.random() * 4);
          card.setAttribute("data-val", val);

          const r = parseInt(card.getAttribute("data-row"));
          const c = parseInt(card.getAttribute("data-col"));

          if (val === 0) {
            rowBombs[r]++;
            colBombs[c]++;
          } else {
            rowScores[r] += val;
            colScores[c] += val;
          }
        });

        for (let i = 0; i < 5; i++) {
          document.getElementById("hint-row-" + i + "-score").innerText =
            rowScores[i];
          document.getElementById("hint-row-" + i + "-bombs").innerText =
            rowBombs[i];
          document.getElementById("hint-col-" + i + "-score").innerText =
            colScores[i];
          document.getElementById("hint-col-" + i + "-bombs").innerText =
            colBombs[i];
        }
      }

      initBoard();

      allCards.forEach((card) => {
        card.addEventListener("click", function () {
          if (!this.classList.contains("is-flipped")) {
            const val = this.getAttribute("data-val");
            this.classList.add("is-flipped", "val-" + val);
          }
        });
      });

      document.body.addEventListener(
        "click",
        function () {
          const bgm = document.getElementById("bgm");
          if (bgm.paused) {
            bgm.play();
          }
        },
        { once: true },
      );

      function resetGameUI() {
        gameOverScreen.style.display = "none";
        currentScore.innerText = "0";
        initBoard();
      }

      restartBtn.addEventListener("click", resetGameUI);
      restartGameBtn.addEventListener("click", resetGameUI);
    </script>
  </body>
</html>
